<!DOCTYPE html>
<html>
<head>
    <title>HTML Images</title>
</head>
<body>
    <h2>Image Examples</h2>
    
    <h3>Basic Image</h3>
    <img src="https://via.placeholder.com/300x200" alt="Placeholder Image">
    
    <h3>Image with Dimensions</h3>
    <img src="https://via.placeholder.com/500x300" alt="Large Image" width="400" height="250">
    
    <h3>Image with Border</h3>
    <img src="https://via.placeholder.com/200x200" alt="Square Image" border="5">
    
    <h3>Image as Link</h3>
    <a href="https://www.example.com">
        <img src="https://via.placeholder.com/150x150" alt="Clickable Image">
    </a>
    
    <h3>Image with Alignment</h3>
    <p>
        <img src="https://via.placeholder.com/50x50" align="left" hspace="10">
        This text wraps around the image on the left side. The image is aligned to the left and text flows around it.
    </p>
    
    <br clear="all">
    
    <h3>Image with Caption</h3>
    <figure>
        <img src="https://via.placeholder.com/400x300" alt="Nature">
        <figcaption>Beautiful Nature Landscape</figcaption>
    </figure>
</body>
</html>
