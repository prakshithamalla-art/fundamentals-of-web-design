<!DOCTYPE html>
<html>
<head>
    <title>Colspan and Rowspan</title>
</head>
<body>
    <h2>Course Schedule</h2>
    <table border="2" cellpadding="15" cellspacing="0">
        <tr>
            <th>S.NO</th>
            <th>COURSE_TITLE</th>
            <th>CREDITS</th>
        </tr>
        <tr>
            <td rowspan="2">1</td>
            <td>Data Structures and Algorithms</td>
            <td>4</td>
        </tr>
        <tr>
            <td>Fundamentals of Web Development</td>
            <td>3</td>
        </tr>
        <tr>
            <td rowspan="2">2</td>
            <td>Database Management Systems</td>
            <td>4</td>
        </tr>
        <tr>
            <td>Operating Systems</td>
            <td>3</td>
        </tr>
        <tr>
            <td colspan="3" align="center"><b>Total Credits: 14</b></td>
        </tr>
    </table>
</body>
</html>
