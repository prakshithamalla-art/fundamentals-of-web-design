<!DOCTYPE html>
<html>
<head>
    <title>HTML Links</title>
</head>
<body>
    <h2>Different Types of Links</h2>
    
    <h3>1. External Link</h3>
    <a href="https://www.google.com">Go to Google</a>
    
    <h3>2. Link with Target</h3>
    <a href="https://www.wikipedia.org" target="_blank">Open Wikipedia in New Tab</a>
    
    <h3>3. Internal Page Link</h3>
    <a href="about.html">About Us</a>
    
    <h3>4. Link to Email</h3>
    <a href="mailto:info@college.edu">Send Email</a>
    
    <h3>5. Link with Title (Tooltip)</h3>
    <a href="contact.html" title="Go to Contact Page">Contact Us</a>
    
    <h3>6. Link as Button</h3>
    <a href="register.html" style="background-color:blue; color:white; padding:10px; text-decoration:none">Register Now</a>
</body>
</html>
