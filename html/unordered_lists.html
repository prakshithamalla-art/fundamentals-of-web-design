<!DOCTYPE html>
<html>
<head>
    <title>Unordered Lists</title>
</head>
<body>
    <h2>Unordered List - Disc (Default)</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>

    <h2>Unordered List - Circle</h2>
    <ul type="circle">
        <li>Red</li>
        <li>Blue</li>
        <li>Green</li>
    </ul>

    <h2>Unordered List - Square</h2>
    <ul type="square">
        <li>Car</li>
        <li>Bike</li>
        <li>Bus</li>
    </ul>

    <h2>Unordered List - None</h2>
    <ul type="none">
        <li>Item without bullet</li>
        <li>Another item</li>
    </ul>
</body>
</html>
