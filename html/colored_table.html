<!DOCTYPE html>
<html>
<head>
    <title>Colored Table</title>
</head>
<body>
    <h2>Student Grades</h2>
    <table border="1" cellpadding="10" cellspacing="0" width="100%">
        <tr bgcolor="#333333" style="color:white">
            <th>Student ID</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Grade</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Alex</td>
            <td bgcolor="lightblue">Mathematics</td>
            <td bgcolor="lightgreen">A</td>
            <td bgcolor="lightgreen">Pass</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Sarah</td>
            <td bgcolor="lightblue">Physics</td>
            <td bgcolor="yellow">B</td>
            <td bgcolor="lightgreen">Pass</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Mike</td>
            <td bgcolor="lightblue">Chemistry</td>
            <td bgcolor="lightcoral">D</td>
            <td bgcolor="lightcoral">Fail</td>
        </tr>
        <tr bgcolor="#f0f0f0">
            <td colspan="5" align="center">End of Grade Report</td>
        </tr>
    </table>
</body>
</html>
