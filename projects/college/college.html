<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC College</title>
    <link rel="stylesheet" href="college.css">
</head>
<body>
    <header id="header">
        <h1 id="collegeName">ABC College of Engineering</h1>
        <p id="tagline">Empowering Future Leaders Since 1980</p>
    </header>
    
    <nav id="navbar">
        <ul>
            <li><a href="#home" class="nav-link" data-section="home">Home</a></li>
            <li><a href="#about" class="nav-link" data-section="about">About</a></li>
            <li><a href="#courses" class="nav-link" data-section="courses">Courses</a></li>
            <li><a href="#faculty" class="nav-link" data-section="faculty">Faculty</a></li>
            <li><a href="#events" class="nav-link" data-section="events">Events</a></li>
            <li><a href="#contact" class="nav-link" data-section="contact">Contact</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <!-- Dynamic content will be loaded here -->
        <div id="content-area"></div>
        
        <section class="stats" id="statsSection">
            <div class="stat-item">
                <h4 id="foundedYear">1980</h4>
                <p>Founded</p>
            </div>
            <div class="stat-item">
                <h4 id="studentCount">5000+</h4>
                <p>Students</p>
            </div>
            <div class="stat-item">
                <h4 id="facultyCount">300+</h4>
                <p>Faculty</p>
            </div>
            <div class="stat-item">
                <h4 id="placementRate">95%</h4>
                <p>Placement</p>
            </div>
        </section>
    </div>
    
    <footer id="footer">
        <div class="footer-links" id="footerLinks">
            <a href="#privacy">Privacy Policy</a>
            <a href="#terms">Terms of Use</a>
            <a href="#careers">Careers</a>
        </div>
        <p id="copyright">© 2024 ABC College. All rights reserved.</p>
    </footer>
    
    <script src="college.js"></script>
</body>
</html>
