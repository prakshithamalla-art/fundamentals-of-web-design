<!DOCTYPE html>
<html>
<head>
    <title>Async JavaScript - Fetch API</title>
</head>
<body>
    <h2>Async JavaScript with Fetch API</h2>
    
    <button onclick="fetchWithThen()">Fetch with .then()</button>
    <button onclick="fetchWithAsync()">Fetch with Async/Await</button>
    <button onclick="fetchUser()">Fetch Single User</button>
    <button onclick="fetchPosts()">Fetch Posts</button>
    
    <div id="apiOutput" style="margin-top: 20px; padding: 20px; background-color: #f0f0f0; border-radius: 5px;"></div>
    
    <script>
        function displayOutput(data) {
            document.getElementById("apiOutput").innerHTML = 
                "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
        }
        
        // Using .then()
        function fetchWithThen() {
            fetch("https://jsonplaceholder.typicode.com/users")
                .then(response => {
                    if(!response.ok) {
                        throw new Error("Network response was not ok");
                    }
                    return response.json();
                })
                .then(data => {
                    displayOutput(data);
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("apiOutput").innerHTML = 
                        "Error: " + error.message;
                });
        }
        
        // Using Async/Await
        async function fetchWithAsync() {
            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/users");
                if(!response.ok) {
                    throw new Error("Network response was not ok");
                }
                let data = await response.json();
                displayOutput(data);
            } catch(error) {
                console.error("Error:", error);
                document.getElementById("apiOutput").innerHTML = 
                    "Error: " + error.message;
            }
        }
        
        // Fetch single user
        async function fetchUser() {
            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/users/1");
                let data = await response.json();
                document.getElementById("apiOutput").innerHTML = `
                    <h3>User Details:</h3>
                    <p><b>Name:</b> ${data.name}</p>
                    <p><b>Email:</b> ${data.email}</p>
                    <p><b>Phone:</b> ${data.phone}</p>
                    <p><b>Website:</b> ${data.website}</p>
                    <p><b>Company:</b> ${data.company.name}</p>
                `;
            } catch(error) {
                document.getElementById("apiOutput").innerHTML = "Error: " + error.message;
            }
        }
        
        // Fetch posts
        async function fetchPosts() {
            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/posts?userId=1");
                let posts = await response.json();
                let html = "<h3>Posts:</h3>";
                posts.forEach(post => {
                    html += `
                        <div style="border-bottom: 1px solid #ccc; padding: 10px;">
                            <b>${post.title}</b><br>
                            ${post.body}
                        </div>
                    `;
                });
                document.getElementById("apiOutput").innerHTML = html;
            } catch(error) {
                document.getElementById("apiOutput").innerHTML = "Error: " + error.message;
            }
        }
        
        // POST request example
        async function createPost() {
            let newPost = {
                title: "New Post",
                body: "This is a new post",
                userId: 1
            };
            
            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/posts", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(newPost)
                });
                let data = await response.json();
                console.log("Post created:", data);
            } catch(error) {
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
