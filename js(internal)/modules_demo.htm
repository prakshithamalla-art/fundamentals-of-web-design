<!DOCTYPE html>
<html>
<head>
    <title>ES6 Modules</title>
</head>
<body>
    <h2>ES6 Modules Example</h2>
    
    <div>
        <h3>Calculator</h3>
        <input type="number" id="num1" value="10">
        <input type="number" id="num2" value="5">
        <select id="operation">
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
            <option value="multiply">Multiply</option>
            <option value="divide">Divide</option>
        </select>
        <button onclick="calculate()">Calculate</button>
        <p id="calcResult">Result: </p>
    </div>
    
    <div>
        <h3>String Utils</h3>
        <input type="text" id="inputString" placeholder="Enter text">
        <button onclick="processText()">Process</button>
        <p id="capitalResult">Capitalized: </p>
        <p id="reverseResult">Reversed: </p>
    </div>
    
    <!-- Import modules with type="module" -->
    <script type="module">
        import Calculator, { add, subtract, multiply, divide, PI } from './mathUtils.js';
        import { capitalizeFirst, reverseString } from './stringUtils.js';
        
        // Make functions available globally
        window.calculate = function() {
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let operation = document.getElementById('operation').value;
            
            let result;
            switch(operation) {
                case 'add': result = add(num1, num2); break;
                case 'subtract': result = subtract(num1, num2); break;
                case 'multiply': result = multiply(num1, num2); break;
                case 'divide': result = divide(num1, num2); break;
            }
            
            document.getElementById('calcResult').textContent = 'Result: ' + result;
        };
        
        window.processText = function() {
            let text = document.getElementById('inputString').value;
            document.getElementById('capitalResult').textContent = 
                'Capitalized: ' + capitalizeFirst(text);
            document.getElementById('reverseResult').textContent = 
                'Reversed: ' + reverseString(text);
        };
    </script>
</body>
</html>
