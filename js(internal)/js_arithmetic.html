<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Arithmetic</title>
</head>
<body>
    <h2>JavaScript Arithmetic Operations</h2>
    
    <script>
        let a = 33;
        let b = 10;
        let c = "Test";
        
        document.write("<h3>Arithmetic Operations:</h3>");
        document.write("a = 33, b = 10<br><br>");
        
        document.write("a + b = " + (a + b) + "<br>");
        document.write("a - b = " + (a - b) + "<br>");
        document.write("a * b = " + (a * b) + "<br>");
        document.write("a / b = " + (a / b) + "<br>");
        document.write("a % b = " + (a % b) + "<br>");
        document.write("a++ = " + (a++) + "<br>");
        document.write("++a = " + (++a) + "<br>");
        document.write("b-- = " + (b--) + "<br>");
        document.write("--b = " + (--b) + "<br>");
        document.write("a + b + c = " + (a + b + c) + "<br>");
    </script>
</body>
</html>
