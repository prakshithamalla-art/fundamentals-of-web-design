<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Functions</title>
</head>
<body>
    <h2>JavaScript Functions</h2>
    
    <button onclick="sayHello()">Say Hello</button>
    <button onclick="greetUser('John')">Greet John</button>
    <button onclick="showSum(5, 3)">Show Sum (5+3)</button>
    
    <h3>Function with Return Value</h3>
    <button onclick="displaySquare()">Calculate Square</button>
    <p id="square-result"></p>
    
    <h3>Function Expressions</h3>
    <button onclick="useExpression()">Use Function Expression</button>
    <p id="expression-result"></p>
    
    <script>
        // Simple Function
        function sayHello() {
            alert("Hello World!");
        }
        
        // Function with Parameters
        function greetUser(name) {
            alert("Hello, " + name + "!");
        }
        
        // Function with Multiple Parameters
        function showSum(a, b) {
            alert("Sum: " + (a + b));
        }
        
        // Function with Return Value
        function square(num) {
            return num * num;
        }
        
        function displaySquare() {
            let result = square(7);
            document.getElementById("square-result").innerHTML = 
                "Square of 7 is: " + result;
        }
        
        // Function Expression
        const multiply = function(a, b) {
            return a * b;
        };
        
        function useExpression() {
            let result = multiply(4, 5);
            document.getElementById("expression-result").innerHTML = 
                "4 * 5 = " + result;
        }
        
        // Arrow Function
        const divide = (a, b) => a / b;
        
        // Function Constructor
        const add = new Function("a", "b", "return a + b");
        console.log("Function Constructor:", add(10, 20));
        
        // Recursive Function
        function factorial(n) {
            if (n === 0 || n === 1) return 1;
            return n * factorial(n - 1);
        }
        console.log("Factorial of 5:", factorial(5));
    </script>
</body>
</html>
